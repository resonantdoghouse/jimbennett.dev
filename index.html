<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player 1: Jim Bennett | Creative Tech Lead</title>
    <meta name="description" content="Portfolio of Jim Bennett, a Full Stack Developer specializing in JavaScript, TypeScript, creative coding, and advanced CSS architectures.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Press+Start+2P&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.2",
        "react-dom/": "https://esm.sh/react-dom@^19.2.2/",
        "logrocket": "https://esm.sh/logrocket@^10.1.1",
        "react/": "https://esm.sh/react@^19.2.2/",
        "lucide-react": "https://esm.sh/lucide-react@^0.560.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.4.2",
        "three": "https://esm.sh/three@^0.182.0",
        "vite": "https://esm.sh/vite@^7.2.7",
        "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
      }
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            fontFamily: {
              main: ['Inter', 'sans-serif'],
              pixel: ['"Press Start 2P"', 'cursive'],
              mono: ['"Fira Code"', 'monospace'],
            },
            colors: {
              background: 'var(--bg-body)',
              card: 'var(--bg-card)',
              accent: {
                DEFAULT: 'var(--accent)',
                hover: 'var(--accent-hover)',
                secondary: 'var(--accent-secondary)',
              },
              text: {
                main: 'var(--text-main)',
                muted: 'var(--text-muted)',
                inverse: 'var(--text-inverse)',
              },
              border: 'var(--border)',
            },
            animation: {
              'spin-slow': 'spin 4s linear infinite',
            }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer base {
        :root {
          /* Light Mode */
          --bg-body: #f0f2f5;
          --bg-card: #ffffff;
          --text-main: #1a1a1a;
          --text-inverse: #f0f2f5;
          --text-muted: #525252;
          --accent: #6366f1; /* Indigo */
          --accent-hover: #4f46e5;
          --accent-secondary: #ec4899; /* Pink */
          --border: #e5e7eb;
          --scanline-color: rgba(0,0,0,0.03);
        }

        [data-theme="dark"] {
          --bg-body: #0b0f19;
          --bg-card: #161b2c;
          --text-main: #f1f5f9;
          --text-inverse: #0b0f19;
          --text-muted: #94a3b8;
          --accent: #818cf8;
          --accent-hover: #a5b4fc;
          --accent-secondary: #f472b6;
          --border: #334155;
          --scanline-color: rgba(255,255,255,0.02);
        }

        body {
          cursor: none; /* Custom cursor */
          background-color: var(--bg-body);
          color: var(--text-main);
          transition: background-color 0.3s ease, color 0.3s ease;
          overflow-x: hidden; /* Fix horizontal scrollbar issues on Windows */
        }
      }

      @layer utilities {
        .scanlines {
          background: linear-gradient(to bottom, var(--scanline-color) 50%, transparent 50%);
          background-size: 100% 4px;
          pointer-events: none;
        }

        .pixel-underline::after {
          content: '';
          display: block;
          width: 60px;
          height: 14px;
          /* Creates a segmented "loading bar" look */
          background: repeating-linear-gradient(
            to right,
            var(--accent),
            var(--accent) 8px,
            transparent 8px,
            transparent 12px
          );
          opacity: 0.8;
        }

        .pixel-clip {
          clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
      }
      
      /* Hide scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-body); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent); 
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
